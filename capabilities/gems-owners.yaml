naftiko: 1.0.0-alpha2
info:
  label: RubyGems Gems API — Owners
  description: 'RubyGems Gems API — Owners. 5 operations. Lead operation: Add A Gem Owner. Self-contained Naftiko capability
    covering one Rubygems business surface.'
  tags:
  - Rubygems
  - Owners
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    RUBYGEMS_API_KEY: RUBYGEMS_API_KEY
capability:
  consumes:
  - type: http
    namespace: gems-owners
    baseUri: https://rubygems.org/api/v1
    description: RubyGems Gems API — Owners business capability. Self-contained, no shared references.
    resources:
    - name: gems-gemName-owners
      path: /gems/{gemName}/owners
      operations:
      - name: addgemowner
        method: POST
        description: Add A Gem Owner
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: OTP
          in: header
          type: string
          description: One-time passcode for multi-factor authentication if enabled.
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: removegemowner
        method: DELETE
        description: Remove A Gem Owner
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: OTP
          in: header
          type: string
          description: One-time passcode for multi-factor authentication if enabled.
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: updategemowner
        method: PATCH
        description: Update A Gem Owner
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: OTP
          in: header
          type: string
          description: One-time passcode for multi-factor authentication if enabled.
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: gems-gemName-owners.json
      path: /gems/{gemName}/owners.json
      operations:
      - name: listgemowners
        method: GET
        description: List Owners Of A Gem
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: owners-userHandle-gems.json
      path: /owners/{userHandle}/gems.json
      operations:
      - name: listgemsbyowner
        method: GET
        description: List Gems By Owner
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.RUBYGEMS_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: gems-owners-rest
    port: 8080
    description: REST adapter for RubyGems Gems API — Owners. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/gems/{gemname}/owners
      name: gems-gemname-owners
      description: REST surface for gems-gemName-owners.
      operations:
      - method: POST
        name: addgemowner
        description: Add A Gem Owner
        call: gems-owners.addgemowner
        with:
          OTP: rest.OTP
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: removegemowner
        description: Remove A Gem Owner
        call: gems-owners.removegemowner
        with:
          OTP: rest.OTP
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updategemowner
        description: Update A Gem Owner
        call: gems-owners.updategemowner
        with:
          OTP: rest.OTP
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/gems/{gemname}/owners-json
      name: gems-gemname-owners-json
      description: REST surface for gems-gemName-owners.json.
      operations:
      - method: GET
        name: listgemowners
        description: List Owners Of A Gem
        call: gems-owners.listgemowners
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/owners/{userhandle}/gems-json
      name: owners-userhandle-gems-json
      description: REST surface for owners-userHandle-gems.json.
      operations:
      - method: GET
        name: listgemsbyowner
        description: List Gems By Owner
        call: gems-owners.listgemsbyowner
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: gems-owners-mcp
    port: 9090
    transport: http
    description: MCP adapter for RubyGems Gems API — Owners. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: add-gem-owner
      description: Add A Gem Owner
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: gems-owners.addgemowner
      with:
        OTP: tools.OTP
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: remove-gem-owner
      description: Remove A Gem Owner
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: gems-owners.removegemowner
      with:
        OTP: tools.OTP
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: update-gem-owner
      description: Update A Gem Owner
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: gems-owners.updategemowner
      with:
        OTP: tools.OTP
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: list-owners-gem
      description: List Owners Of A Gem
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: gems-owners.listgemowners
      outputParameters:
      - type: object
        mapping: $.
    - name: list-gems-owner
      description: List Gems By Owner
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: gems-owners.listgemsbyowner
      outputParameters:
      - type: object
        mapping: $.
