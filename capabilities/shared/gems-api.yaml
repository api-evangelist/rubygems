naftiko: "1.0.0-alpha1"

info:
  label: "RubyGems Gems API"
  description: >-
    Shared capability definition for the RubyGems Gems API (v1). Provides
    gem metadata retrieval, ownership management, gem publishing, version
    querying, and OIDC-based trusted publishing operations.
  tags:
    - Ruby
    - Gems
    - Package Manager
    - RubyGems
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      RUBYGEMS_API_KEY: RUBYGEMS_API_KEY

capability:
  consumes:
    - type: http
      namespace: gems-api
      baseUri: https://rubygems.org/api/v1
      description: "RubyGems Gems API v1 for gem metadata, ownership, and publishing"
      authentication:
        type: apikey
        key: Authorization
        value: "{{RUBYGEMS_API_KEY}}"
        placement: header
      resources:
        - name: gems
          path: /gems
          description: Gem metadata and publishing operations
          operations:
            - name: get-gem-info
              method: GET
              description: "Get detailed information about a specific gem by name"
              inputParameters:
                - name: gemName
                  in: path
                  type: string
                  required: true
                  description: "Gem name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-owned-gems
              method: GET
              description: "List gems owned by the authenticated user"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: push-gem
              method: POST
              description: "Submit a built gem to RubyGems.org"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: yank-gem
              method: DELETE
              description: "Remove a specific gem version from RubyGems.org"
              inputParameters:
                - name: gem_name
                  in: query
                  type: string
                  required: true
                  description: "Gem name to yank"
                - name: version
                  in: query
                  type: string
                  required: true
                  description: "Version to yank"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-reverse-dependencies
              method: GET
              description: "Get list of gems that depend on a specific gem"
              inputParameters:
                - name: gemName
                  in: path
                  type: string
                  required: true
                  description: "Gem name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: versions
          path: /versions
          description: Gem version querying
          operations:
            - name: get-gem-versions
              method: GET
              description: "Get all versions for a specific gem"
              inputParameters:
                - name: gemName
                  in: path
                  type: string
                  required: true
                  description: "Gem name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-latest-gem-version
              method: GET
              description: "Get the latest version of a gem"
              inputParameters:
                - name: gemName
                  in: path
                  type: string
                  required: true
                  description: "Gem name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-timeframe-versions
              method: GET
              description: "Get gem versions released within a timeframe"
              inputParameters:
                - name: from
                  in: query
                  type: string
                  required: true
                  description: "Start of timeframe (ISO 8601)"
                - name: to
                  in: query
                  type: string
                  required: false
                  description: "End of timeframe (ISO 8601)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: owners
          path: /gems
          description: Gem ownership management
          operations:
            - name: list-gem-owners
              method: GET
              description: "List owners of a specific gem"
              inputParameters:
                - name: gemName
                  in: path
                  type: string
                  required: true
                  description: "Gem name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: add-gem-owner
              method: POST
              description: "Add an owner to a gem"
              inputParameters:
                - name: gemName
                  in: path
                  type: string
                  required: true
                  description: "Gem name"
                - name: email
                  in: body
                  type: string
                  required: true
                  description: "Email of new owner"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: remove-gem-owner
              method: DELETE
              description: "Remove an owner from a gem"
              inputParameters:
                - name: gemName
                  in: path
                  type: string
                  required: true
                  description: "Gem name"
                - name: email
                  in: body
                  type: string
                  required: true
                  description: "Email of owner to remove"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: profiles
          path: /profiles
          description: User profile retrieval
          operations:
            - name: get-user-profile
              method: GET
              description: "Get profile information for a user"
              inputParameters:
                - name: userHandle
                  in: path
                  type: string
                  required: true
                  description: "User handle or ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: gems-api-rest
      resources:
        - path: /v1/gems/{gemName}
          name: gem
          description: "Gem metadata"
          operations:
            - method: GET
              name: get-gem-info
              description: "Get gem information"
              call: "gems-api.get-gem-info"
              with:
                gemName: "rest.gemName"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/gems/{gemName}/versions
          name: gem-versions
          description: "Gem versions"
          operations:
            - method: GET
              name: get-gem-versions
              description: "Get all versions"
              call: "gems-api.get-gem-versions"
              with:
                gemName: "rest.gemName"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: gems-api-mcp
      transport: http
      tools:
        - name: get-gem-info
          description: "Get detailed metadata for a RubyGem by name"
          hints:
            readOnly: true
            openWorld: false
          call: "gems-api.get-gem-info"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-gem-versions
          description: "List all published versions of a RubyGem"
          hints:
            readOnly: true
            openWorld: false
          call: "gems-api.get-gem-versions"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-latest-gem-version
          description: "Get the latest version number for a RubyGem"
          hints:
            readOnly: true
            openWorld: false
          call: "gems-api.get-latest-gem-version"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-reverse-dependencies
          description: "Get gems that depend on a specific gem"
          hints:
            readOnly: true
            openWorld: false
          call: "gems-api.get-reverse-dependencies"
          outputParameters:
            - type: object
              mapping: "$."
