naftiko: "1.0.0-alpha1"

info:
  label: "RubyGems Webhooks API"
  description: >-
    Shared capability definition for the RubyGems Webhooks API. Enables
    webhook subscription management for gem push events on RubyGems.org,
    including gem-specific and global wildcard webhooks with HMAC verification.
  tags:
    - Ruby
    - Webhooks
    - Events
    - RubyGems
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      RUBYGEMS_API_KEY: RUBYGEMS_API_KEY

capability:
  consumes:
    - type: http
      namespace: webhooks-api
      baseUri: https://rubygems.org/api/v1
      description: "RubyGems Webhooks API for event subscription management"
      authentication:
        type: apikey
        key: Authorization
        value: "{{RUBYGEMS_API_KEY}}"
        placement: header
      resources:
        - name: webhooks
          path: /web_hooks
          description: Webhook subscription management
          operations:
            - name: list-webhooks
              method: GET
              description: "List all webhooks registered for the authenticated user"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-webhook
              method: POST
              description: "Register a new webhook for gem push events"
              inputParameters:
                - name: gem_name
                  in: body
                  type: string
                  required: true
                  description: "Gem name or * for all gems"
                - name: url
                  in: body
                  type: string
                  required: true
                  description: "Webhook delivery URL"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: remove-webhook
              method: DELETE
              description: "Remove an existing webhook subscription"
              inputParameters:
                - name: gem_name
                  in: body
                  type: string
                  required: true
                  description: "Gem name or * for global webhook"
                - name: url
                  in: body
                  type: string
                  required: true
                  description: "Webhook URL to remove"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: fire-webhook
              method: POST
              description: "Test fire an existing webhook"
              inputParameters:
                - name: gem_name
                  in: body
                  type: string
                  required: true
                  description: "Gem name or * for global webhook"
                - name: url
                  in: body
                  type: string
                  required: true
                  description: "Webhook URL to test"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8102
      namespace: webhooks-api-rest
      resources:
        - path: /v1/webhooks
          name: webhooks
          description: "Webhook subscriptions"
          operations:
            - method: GET
              name: list-webhooks
              description: "List registered webhooks"
              call: "webhooks-api.list-webhooks"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-webhook
              description: "Create a webhook subscription"
              call: "webhooks-api.create-webhook"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9102
      namespace: webhooks-api-mcp
      transport: http
      tools:
        - name: list-webhooks
          description: "List all webhook subscriptions for the authenticated RubyGems user"
          hints:
            readOnly: true
            openWorld: false
          call: "webhooks-api.list-webhooks"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-webhook
          description: "Register a new webhook for gem push events on RubyGems.org"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "webhooks-api.create-webhook"
          outputParameters:
            - type: object
              mapping: "$."
        - name: remove-webhook
          description: "Remove an existing webhook subscription from RubyGems.org"
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "webhooks-api.remove-webhook"
          outputParameters:
            - type: object
              mapping: "$."
        - name: fire-webhook
          description: "Test fire a webhook to verify it is working correctly"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "webhooks-api.fire-webhook"
          outputParameters:
            - type: object
              mapping: "$."
