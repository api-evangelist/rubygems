specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: RubyGems
providerId: rubygems
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Ruby
  - Package Manager
  - Open Source
  - Developer Tools
description: RubyGems.org is a free, community-operated public package registry for the Ruby ecosystem,
  funded by Ruby Central and sponsors. The HTTP API has no commercial tier or paid plan; access is open
  to anyone subject to the platform's published rate limits and acceptable-use rules. Heavy or commercial
  consumers are encouraged to mirror the index or use bulk dumps rather than negotiate paid access.
sources:
  - https://guides.rubygems.org/rubygems-org-rate-limits/
  - https://guides.rubygems.org/api/
  - https://rubygems.org/pages/sponsors
plans:
  - id: rubygems-public
    name: Public API
    type: freemium
    description: Free, unauthenticated and authenticated access to the public RubyGems.org API surface.
      No commercial plan tiers exist; rate limits apply equally to all callers.
    entries:
      - label: API Access
        name: api_access
        type: flat
        metric: request
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Gems API (v1)
      - name: API V2
      - name: Downloads API
      - name: Search API
      - name: Activity API
      - name: Webhooks API
      - name: Compact Index / Dependency API
      - name: Community Support via support@rubygems.org
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
