name: RubyGems Vocabulary
description: >-
  Domain vocabulary and taxonomy for RubyGems.org, covering Ruby gem concepts,
  package management terminology, versioning, ownership, and event systems.
version: "1.0"
created: "2026-05-02"
modified: "2026-05-02"

domains:
  - name: Gem Concepts
    description: Core concepts in Ruby gem packaging and distribution
    terms:
      - term: Gem
        definition: >-
          A packaged Ruby library or application that can be installed,
          managed, and distributed through RubyGems.org. A gem includes
          code, tests, documentation, and a gemspec.
      - term: Gemspec
        definition: >-
          A specification file describing a gem's metadata including name,
          version, authors, description, dependencies, and files to include.
      - term: Bundler
        definition: >-
          A dependency manager for Ruby that uses a Gemfile to specify and
          install gem dependencies. Integrates with the RubyGems compact index.
      - term: Platform
        definition: >-
          The target platform for a gem build (e.g., ruby, java, x86_64-linux).
          Platform-specific gems contain pre-compiled native extensions.

  - name: Versioning
    description: Gem version management and conventions
    terms:
      - term: Semantic Versioning
        definition: >-
          The MAJOR.MINOR.PATCH version scheme used by most gems.
          MAJOR indicates breaking changes, MINOR adds features, PATCH fixes bugs.
      - term: Yanked Gem
        definition: >-
          A gem version that has been removed from the RubyGems.org index.
          Yanked versions are no longer installable but metadata is preserved.
      - term: Prerelease
        definition: >-
          A gem version labeled as pre-release (alpha, beta, rc) indicating
          it is not yet production-ready. Requires explicit installation.
      - term: Lock File
        definition: >-
          A Gemfile.lock file generated by Bundler that records exact gem
          versions for reproducible installs across environments.

  - name: Publishing Operations
    description: Operations for publishing and managing gems
    terms:
      - term: Push
        definition: >-
          The act of uploading a built gem file (.gem) to RubyGems.org,
          making it publicly available for installation.
      - term: Yank
        definition: >-
          The act of removing a gem version from the RubyGems.org index,
          preventing new installations but preserving existing ones.
      - term: Trusted Publishing
        definition: >-
          A mechanism for publishing gems from CI/CD systems using OIDC
          identity tokens instead of long-lived API keys. Supported via
          the /oidc/trusted_publisher/exchange_token endpoint.

  - name: Ownership and Access
    description: Gem ownership and access control concepts
    terms:
      - term: Owner
        definition: >-
          A RubyGems.org user with push/yank access to a specific gem.
          Gems can have multiple owners with different roles.
      - term: API Key
        definition: >-
          A credential used to authenticate API requests to RubyGems.org.
          Keys can be scoped to specific permissions and rotated.
      - term: API Key Scopes
        definition: >-
          Permission flags that control what operations an API key can
          perform (e.g., push, yank, own_gem, add_owner, remove_owner).
      - term: MFA
        definition: >-
          Multi-Factor Authentication. RubyGems.org supports MFA for
          account security; some operations require an OTP header.

  - name: Webhooks
    description: Event-driven notifications for gem activity
    terms:
      - term: Webhook
        definition: >-
          An HTTP callback registered to receive notifications when a gem
          is pushed to RubyGems.org.
      - term: Global Webhook
        definition: >-
          A webhook registered with asterisk (*) as the gem name that
          fires for every gem push on RubyGems.org.
      - term: HMAC Signature
        definition: >-
          A SHA-256 HMAC hash included in webhook Authorization headers
          for verifying that notifications originated from RubyGems.org.

tags:
  - Ruby
  - Package Manager
  - Open Source
  - Developer Tools
  - Gems
